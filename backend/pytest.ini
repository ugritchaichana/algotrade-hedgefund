[pytest]
testpaths = tests
# By default exclude heavy/destructive tests. Opt-in with `-m heavy` to run them.
addopts = -ra -q -m "not heavy"
markers =
    heavy: actually mutates state, runs long, or burns broker quota (kill-switch, full backtest, deep-backfill, optimize, reflection). Run explicitly with `-m heavy`.
filterwarnings =
    ignore::DeprecationWarning
